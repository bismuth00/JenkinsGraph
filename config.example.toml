# config.toml にコピーして値を埋めてください
# (config.toml は認証情報を含むため .gitignore 済み)

[jenkins]
url = "https://jenkins.example.com"
user = "reader"
# API トークン。ここに書く代わりに環境変数 JENKINS_TOKEN でも渡せる
token = ""

[jobs]
# 収集対象のジョブを正規表現で指定する (fullName に対する部分一致)。
# 完全一致にしたい場合は ^$ でアンカーする。
# - include が空 (または未指定) なら全ジョブが対象
# - exclude は include より優先される
# - 除外したジョブはそもそも収集されない (Jenkins 側の履歴が消えると遡れない)
#   ため、後で対象を広げる可能性があるなら絞りすぎに注意。
#   表示だけを絞りたい場合は [report.timeline] / [report.charts] を使う
# 例: include = ["^app/", "nightly$"]
#     exclude = ["sandbox", "-test-"]
include = []
exclude = []

[db]
path = "jenkins.db"

[report]
# レポートに含める最大期間(日数)。レポート上のボタンでこの範囲内の
# 期間 (7/14/30/... 日) に切り替えて表示できる
days = 60
output = "report.html"
# タブの表示 (概要のタイムラインは常に表示)
show_trend = true    # 「失敗率の推移」タブ (日別・折れ線)
show_heatmap = true  # 「ヒートマップ」タブ (日別)
# 失敗率の推移に線を描くジョブ数の上限。表示対象がこれを超えた場合は
# 失敗率ワースト上位のみ表示する (ジョブが多すぎると描画できないため)
trend_max_jobs = 50
# 処理時間タブ (箱ひげ図) に一度に表示するジョブ数の上限。
# ジョブごとに 1 チャートを縦に並べるため、多すぎると重くなる
box_max_jobs = 20
# 行単位のチャート (タイムライン・ヒートマップ等) の表示行数がこれを超えると
# 高さを固定してマウスホイールの縦スクロールに切り替える
scroll_rows = 200
# ノードタブに「このジョブだけを実行している、または何も実行していない
# ノード数」を表示するための対象ジョブ (正規表現)。未設定なら表示しない。
# フォルダ配下のジョブは "(^|/)N-" のように書く
# node_free_jobs = ["(^|/)N-"]

# 表示対象のジョブの絞り込み (正規表現、書き方は [jobs] と同じ)。
# 収集対象 ([jobs]) とは独立に、表示だけを絞れる。未設定なら全ジョブ
[report.timeline]
# 概要 (タイムライン)・失敗率の推移・ヒートマップ・処理時間・
# 詳細タイムラインの各タブの表示対象
include = []
exclude = []

[report.node]
# ノードタブに表示するビルドの対象
include = []
exclude = []

[report.pipeline]
# パイプラインタブの起点ビルドの対象
include = []
exclude = []
