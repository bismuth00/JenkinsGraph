# config.toml にコピーして値を埋めてください
# (config.toml は認証情報を含むため .gitignore 済み)

[jenkins]
url = "https://jenkins.example.com"
user = "reader"
# API トークン。ここに書く代わりに環境変数 JENKINS_TOKEN でも渡せる
token = ""

[jobs]
# 収集対象のジョブを正規表現で指定する (fullName に対する部分一致)。
# 完全一致にしたい場合は ^$ でアンカーする。
# - include が空 (または未指定) なら全ジョブが対象
# - exclude は include より優先される
# - 除外したジョブはそもそも収集されない (Jenkins 側の履歴が消えると遡れない)
#   ため、後で対象を広げる可能性があるなら絞りすぎに注意。
#   表示だけを絞りたい場合は [report.timeline] / [report.charts] を使う
# 例: include = ["^app/", "nightly$"]
#     exclude = ["sandbox", "-test-"]
include = []
exclude = []

[db]
path = "jenkins.db"

[report]
# レポートに含める最大期間(日数)。レポート上のボタンでこの範囲内の
# 期間 (7/14/30/... 日) に切り替えて表示できる
days = 60
output = "report.html"
# 概要タブのチャートの表示 (タイムラインは常に表示)
show_trend = true    # 日別失敗率の推移 (折れ線)
show_heatmap = true  # 日別ヒートマップ

# 表示対象のジョブの絞り込み (正規表現、書き方は [jobs] と同じ)。
# 収集対象 ([jobs]) とは独立に、表示だけを絞れる。未設定なら全ジョブ
[report.timeline]
# 概要タブ (タイムライン・失敗率の推移・ヒートマップ) と
# 詳細タイムラインの表示対象
include = []
exclude = []

[report.charts]
# ノードタブのビルドとパイプラインタブの起点ビルドの表示対象
include = []
exclude = []
