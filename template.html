<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="utf-8">
<title>Jenkins ジョブ失敗レポート</title>
<script src="https://cdn.jsdelivr.net/npm/echarts@5/dist/echarts.min.js"></script>
<style>
  body { font-family: "Segoe UI", "Hiragino Sans", "Meiryo", sans-serif; margin: 24px; color: #263238; background: #fff; }
  h1 { font-size: 22px; }
  h2 { font-size: 17px; margin-top: 36px; border-left: 4px solid #607d8b; padding-left: 8px; }
  .meta { color: #78909c; font-size: 13px; }
  .period { font-size: 13px; margin: 12px 0; display: flex; align-items: center; flex-wrap: wrap; gap: 6px; }
  .period input[type="date"] { border: 1px solid #b0bec5; border-radius: 4px; padding: 3px 8px; font-size: 13px; color: #263238; }
  .period input[type="text"] { border: 1px solid #b0bec5; border-radius: 4px; padding: 3px 8px; font-size: 13px; color: #263238; width: 240px; }
  .period select { border: 1px solid #b0bec5; border-radius: 4px; padding: 3px 8px; font-size: 13px; color: #263238; background: #fff; }
  .period label { display: flex; align-items: center; gap: 4px; margin-left: 6px; cursor: pointer; }
  .period .presets { margin-left: 12px; color: #78909c; }
  .period button { border: 1px solid #b0bec5; background: #fff; color: #455a64; padding: 4px 14px; margin-left: 6px; border-radius: 4px; cursor: pointer; font-size: 13px; }
  .period button.active { background: #607d8b; border-color: #607d8b; color: #fff; }
  .chart-tools { margin: 0 0 4px; }
  .chart-tools button { border: 1px solid #b0bec5; background: #fff; color: #455a64; padding: 2px 10px; margin-right: 6px; border-radius: 4px; cursor: pointer; font-size: 12px; }
  .legend { font-size: 13px; margin: 4px 0 8px; }
  .legend span { display: inline-block; margin-right: 16px; }
  .legend i { display: inline-block; width: 12px; height: 12px; border-radius: 2px; margin-right: 4px; vertical-align: -1px; }
</style>
</head>
<body>
<h1>Jenkins ジョブ失敗レポート</h1>
<p class="meta" id="meta"></p>
<div class="period">
  表示期間:
  <input type="date" id="from">
  〜
  <input type="date" id="to">
  <span class="presets">直近:</span>
  <span id="presets"></span>
</div>
<div class="period">
  表示ジョブ:
  <input type="text" id="job-search" placeholder="検索 (スペース区切りで OR)">
  <label><input type="checkbox" id="failed-only"> 失敗があったジョブのみ</label>
  並び順:
  <select id="job-sort">
    <option value="name">名前順</option>
    <option value="fail">失敗率ワースト順</option>
    <option value="worse">悪化順 (前半→後半)</option>
  </select>
  <span class="presets" id="job-count"></span>
</div>

<h2>タイムライン(結果が同じだった期間の帯)</h2>
<div class="legend">
  <span><i style="background:#66bb6a"></i>SUCCESS</span>
  <span><i style="background:#e53935"></i>FAILURE</span>
  <span><i style="background:#ffa726"></i>UNSTABLE</span>
  <span><i style="background:#bdbdbd"></i>ABORTED</span>
</div>
<div id="timeline"></div>

<h2>日別失敗率の推移 — 1日のうち失敗状態だった時間の割合(凡例クリックでジョブの表示 ON/OFF)</h2>
<div class="chart-tools">
  <button id="trend-all-on">全て表示</button>
  <button id="trend-all-off">全て非表示</button>
</div>
<div id="trend"></div>

<h2>日別ヒートマップ — ビルドの失敗率(失敗ビルド数 ÷ ビルド数、%)</h2>
<div id="heatmap"></div>

<script>
const DATA = __DATA__;

const COLORS = {
  SUCCESS: "#66bb6a",
  FAILURE: "#e53935",
  UNSTABLE: "#ffa726",
  ABORTED: "#bdbdbd",
  NOT_BUILT: "#e0e0e0",
};
const jobs = DATA.jobs;
const OK_CODE = DATA.results.indexOf("SUCCESS");
const FAIL_CODES = new Set(
  DATA.fail_results.map((r) => DATA.results.indexOf(r)).filter((i) => i >= 0)
);
const DAY_MS = 86400000;
const fmt = (t) => new Date(t).toLocaleString("ja-JP");

function dayKey(ts) {
  const d = new Date(ts);
  const p = (n) => String(n).padStart(2, "0");
  return `${d.getFullYear()}-${p(d.getMonth() + 1)}-${p(d.getDate())}`;
}

// "YYYY-MM-DD" → その日のローカル 0 時のエポックミリ秒
function parseDate(value) {
  const [y, m, d] = value.split("-").map(Number);
  return new Date(y, m - 1, d).getTime();
}

function daysAgo(n) {
  const d = new Date(DATA.now);
  d.setHours(0, 0, 0, 0);
  d.setDate(d.getDate() - n);
  return d.getTime();
}

// 埋め込みデータがある範囲 (日付入力の min/max)
const MIN_DATE = dayKey(daysAgo(DATA.days - 1));
const MAX_DATE = dayKey(DATA.now);

// ---- 表示対象のジョブ (フィルタ・並び替え後) ----
// viewIdx: DATA.jobs / DATA.builds に対する元 index の配列。viewJobs: その名前。
// viewDaily: dailyFailTime の結果。viewDelta: 前半→後半の失敗率の変化 (pt)。
let viewIdx = [];
let viewJobs = [];
let viewDaily = [];
let viewDelta = [];

// 期間の前半と後半の失敗率の差 (パーセントポイント)。どちらかが状態不明なら null。
function halfDelta(failMs, knownMs) {
  const mid = Math.floor(failMs.length / 2);
  const sum = (arr, s, e) => arr.slice(s, e).reduce((a, b) => a + b, 0);
  const k1 = sum(knownMs, 0, mid);
  const k2 = sum(knownMs, mid, knownMs.length);
  if (!k1 || !k2) return null;
  return (sum(failMs, mid, failMs.length) / k2 - sum(failMs, 0, mid) / k1) * 100;
}

function computeView(fromMs, endMs) {
  const days = Math.round((endMs - fromMs) / DAY_MS);
  const terms = document.getElementById("job-search").value
    .trim().toLowerCase().split(/\s+/).filter(Boolean);
  const failedOnly = document.getElementById("failed-only").checked;
  const sortMode = document.getElementById("job-sort").value;

  const items = [];
  jobs.forEach((name, ji) => {
    if (terms.length && !terms.some((t) => name.toLowerCase().includes(t))) return;
    const daily = dailyFailTime(DATA.builds[ji], fromMs, days);
    const fail = daily.failMs.reduce((a, b) => a + b, 0);
    const known = daily.knownMs.reduce((a, b) => a + b, 0);
    if (failedOnly && fail === 0) return;
    items.push({
      ji, name, daily,
      rate: known ? fail / known : -1,
      delta: halfDelta(daily.failMs, daily.knownMs),
    });
  });
  if (sortMode === "fail") {
    items.sort((a, b) => b.rate - a.rate || a.name.localeCompare(b.name));
  } else if (sortMode === "worse") {
    items.sort((a, b) =>
      ((b.delta ?? -Infinity) - (a.delta ?? -Infinity)) || a.name.localeCompare(b.name));
  }
  viewIdx = items.map((x) => x.ji);
  viewJobs = items.map((x) => x.name);
  viewDaily = items.map((x) => x.daily);
  viewDelta = items.map((x) => x.delta);
}

// ---- 選択中の期間 [fromMs, endMs) に対する集計 (表示対象のジョブのみ) ----

function computeStats(fromMs, endMs) {
  const stats = {};
  viewJobs.forEach((job, vi) => {
    let ok = 0, ng = 0, total = 0;
    for (const [ts, code] of DATA.builds[viewIdx[vi]]) {
      if (ts < fromMs || ts >= endMs) continue;
      total++;
      if (code === OK_CODE) ok++;
      else if (FAIL_CODES.has(code)) ng++;
    }
    stats[job] = {
      total,
      okPct: total ? Math.round((ok / total) * 100) : 0,
      ngPct: total ? Math.round((ng / total) * 100) : 0,
      delta: viewDelta[vi],
    };
  });
  return stats;
}

// ジョブの「同じ結果が続いた区間」を [開始ms, 終了ms, 結果コード] で返す。
// 区間の終了は次に結果が変わったビルドの開始時刻、最後の区間は現在時刻まで。
function jobRuns(builds) {
  const changes = [];
  for (const [ts, code] of builds) {
    if (!changes.length || changes[changes.length - 1][1] !== code) changes.push([ts, code]);
  }
  return changes.map(([start, code], i) => [
    start,
    i + 1 < changes.length ? changes[i + 1][0] : DATA.now,
    code,
  ]);
}

function computeSpans(fromMs, endMs) {
  // 区間を [表示行idx, 開始ms, 終了ms, 結果名] の帯にして表示範囲でクリップする。
  const spans = [];
  viewIdx.forEach((oji, vi) => {
    for (const [start, end, code] of jobRuns(DATA.builds[oji])) {
      const s = Math.max(start, fromMs);
      const e = Math.min(end, endMs);
      if (e <= s) continue;
      spans.push([vi, s, e, DATA.results[code]]);
    }
  });
  return spans;
}

// 日ごとの [失敗していた時間, 状態が分かっている時間] (ミリ秒)。
// 「失敗していた時間」は失敗区間とその日の重なり。最初のビルドより前や
// 未来の時間帯は「状態不明」として分母に含めない。
function dailyFailTime(builds, fromMs, days) {
  const failMs = new Array(days).fill(0);
  const knownMs = new Array(days).fill(0);
  const endMs = Math.min(fromMs + days * DAY_MS, DATA.now);
  for (const [start, end, code] of jobRuns(builds)) {
    let s = Math.max(start, fromMs);
    const e = Math.min(end, endMs);
    const fail = FAIL_CODES.has(code);
    while (s < e) {
      const di = Math.floor((s - fromMs) / DAY_MS);
      const chunk = Math.min(e, fromMs + (di + 1) * DAY_MS) - s;
      knownMs[di] += chunk;
      if (fail) failMs[di] += chunk;
      s += chunk;
    }
  }
  return { failMs, knownMs };
}

const hoursLabel = (ms) => (ms / 3600000).toFixed(1) + "h";

function computeHeatmap(fromMs, endMs) {
  // ビルド回数ベースの失敗率: その日の失敗ビルド数 ÷ ビルド数。
  // ビルドがなかった日はセルなし (空白)。
  const dates = [];
  for (let t = fromMs; t < endMs; t += DAY_MS) dates.push(dayKey(t));

  const values = [];
  viewIdx.forEach((oji, vi) => {
    const agg = new Map(); // 日付idx -> [失敗数, 総数]
    for (const [ts, code] of DATA.builds[oji]) {
      if (ts < fromMs || ts >= endMs) continue;
      const di = Math.floor((ts - fromMs) / DAY_MS);
      const cell = agg.get(di) || [0, 0];
      cell[1]++;
      if (FAIL_CODES.has(code)) cell[0]++;
      agg.set(di, cell);
    }
    for (const [di, [fail, total]] of agg) {
      const rate = Math.round((fail / total) * 100);
      values.push({
        value: [di, vi, rate, fail, total],
        // 濃い色のセルでも読めるよう、失敗率に応じてラベル色を切り替える
        label: { color: rate >= 50 ? "#fff" : "#455a64" },
      });
    }
  });
  return { dates, values };
}

const MA_WINDOW = 7; // 移動平均の窓幅 (日)

// 直近 w 日間の失敗時間の合計 ÷ 状態が分かっている時間の合計 (%)
function movingAvg(failMs, knownMs, w) {
  return failMs.map((_, i) => {
    let f = 0, k = 0;
    for (let j = Math.max(0, i - w + 1); j <= i; j++) {
      f += failMs[j];
      k += knownMs[j];
    }
    return k ? Math.round((f / k) * 100) : null;
  });
}

function computeTrends(fromMs, endMs) {
  // ジョブごとの「1 日のうち失敗状態だった時間の割合」と、その 7 日移動平均。
  // 状態が分からない日 (最初のビルドより前) は null (線が途切れる)。
  const dates = [];
  for (let t = fromMs; t < endMs; t += DAY_MS) dates.push(dayKey(t));
  const perJob = viewJobs.map((job, vi) => {
    const { failMs, knownMs } = viewDaily[vi];
    const rates = knownMs.map((known, di) =>
      known ? Math.round((failMs[di] / known) * 100) : null
    );
    return { name: job, rates, maRates: movingAvg(failMs, knownMs, MA_WINDOW) };
  });
  return { dates, perJob };
}

// ---- チャート ----

const ROW_H_TL = 40; // タイムラインはラベル 2 行分
const ROW_H_HM = 28;

const tlEl = document.getElementById("timeline");
tlEl.style.height = jobs.length * ROW_H_TL + 100 + "px";
const tl = echarts.init(tlEl);

const trendEl = document.getElementById("trend");
// 左の縦並び凡例が全ジョブ収まる高さを確保する
trendEl.style.height = Math.max(300, jobs.length * 24 + 80) + "px";
const trend = echarts.init(trendEl);
let trendSelected = {}; // 凡例の ON/OFF 状態 (期間切り替え後も維持する)
// クリックは legendselectchanged、legendSelect/legendUnSelect アクションは
// 別イベントになるためすべて監視する
for (const ev of ["legendselectchanged", "legendselected", "legendunselected"]) {
  trend.on(ev, (e) => { trendSelected = e.selected; });
}

function setAllTrendSeries(on) {
  const type = on ? "legendSelect" : "legendUnSelect";
  for (const job of viewJobs) trend.dispatchAction({ type, name: job });
  trendSelected = trend.getOption().legend[0].selected;
}
document.getElementById("trend-all-on").addEventListener("click", () => setAllTrendSeries(true));
document.getElementById("trend-all-off").addEventListener("click", () => setAllTrendSeries(false));

const hmEl = document.getElementById("heatmap");
hmEl.style.height = jobs.length * ROW_H_HM + 120 + "px";
const hm = echarts.init(hmEl);

let currentSpans = [];
let currentDates = [];
let stats = {};

function timelineOption(fromMs, axisMax) {
  return {
    tooltip: {
      formatter: (p) => {
        const d = currentSpans[p.dataIndex];
        const hours = ((d[2] - d[1]) / 3600000).toFixed(1);
        return `<b>${viewJobs[d[0]]}</b><br>${d[3]}<br>${fmt(d[1])} 〜 ${fmt(d[2])}<br>(${hours} 時間)`;
      },
    },
    grid: { left: 250, right: 30, top: 20, bottom: 40 },
    xAxis: { type: "time", min: fromMs, max: axisMax },
    yAxis: {
      type: "category",
      data: viewJobs,
      inverse: true,
      axisLabel: {
        margin: 12,
        formatter: (job) => {
          // rich テキストは overflow truncate が効かないため文字数で切り詰める
          const name = job.length > 34 ? job.slice(0, 33) + "…" : job;
          const s = stats[job];
          if (!s || !s.total) return `{name|${name}}\n{dim|期間内ビルドなし}`;
          // 期間の前半→後半の失敗率の変化 (±5pt 以上で悪化/改善とみなす)
          let tag = "";
          if (s.delta != null) {
            const d = Math.round(s.delta);
            const txt = (d >= 0 ? "+" : "") + d + "pt";
            if (d >= 5) tag = `{up| ↗${txt}}`;
            else if (d <= -5) tag = `{down| ↘${txt}}`;
            else tag = `{flat| →${txt}}`;
          }
          return `{name|${name}}\n{ok|成功 ${s.okPct}%}{sep| / }{ng|失敗 ${s.ngPct}%}{dim| (${s.total}件)}${tag}`;
        },
        rich: {
          name: { align: "right", color: "#263238", lineHeight: 18 },
          ok: { color: "#2e7d32", fontSize: 11, lineHeight: 14 },
          sep: { color: "#90a4ae", fontSize: 11, lineHeight: 14 },
          ng: { color: "#c62828", fontSize: 11, lineHeight: 14 },
          dim: { color: "#90a4ae", fontSize: 11, lineHeight: 14 },
          up: { color: "#c62828", fontSize: 11, lineHeight: 14, fontWeight: "bold" },
          down: { color: "#2e7d32", fontSize: 11, lineHeight: 14, fontWeight: "bold" },
          flat: { color: "#90a4ae", fontSize: 11, lineHeight: 14 },
        },
      },
    },
    series: [{
      type: "custom",
      encode: { x: [1, 2], y: 0 },
      data: currentSpans,
      renderItem: (params, api) => {
        const y = api.coord([api.value(1), api.value(0)])[1];
        const x1 = api.coord([api.value(1), 0])[0];
        const x2 = api.coord([api.value(2), 0])[0];
        const h = Math.min(api.size([0, 1])[1] * 0.5, 18);
        const rect = echarts.graphic.clipRectByRect(
          { x: x1, y: y - h / 2, width: Math.max(x2 - x1, 1), height: h },
          { x: params.coordSys.x, y: params.coordSys.y, width: params.coordSys.width, height: params.coordSys.height }
        );
        return rect && {
          type: "rect",
          shape: rect,
          style: { fill: COLORS[currentSpans[params.dataIndex][3]] || "#90a4ae" },
        };
      },
    }],
  };
}

const PALETTE = ["#5470c6", "#91cc75", "#fac858", "#ee6666", "#73c0de",
                 "#3ba272", "#fc8452", "#9a60b4", "#ea7ccc"];

function trendOption(t, selected) {
  return {
    tooltip: {
      trigger: "axis",
      formatter: (ps) => {
        // 同じジョブの移動平均と日次を 1 行にまとめる
        const byJob = new Map();
        for (const p of ps) {
          const [kind, vi] = p.seriesId.split(":");
          if (!byJob.has(vi)) byJob.set(vi, { name: p.seriesName, marker: p.marker });
          byJob.get(vi)[kind] = p.value;
        }
        const lines = [ps[0].name];
        for (const g of byJob.values()) {
          if (g.ma == null && g.raw == null) continue;
          lines.push(`${g.marker}${g.name}: ${MA_WINDOW}日平均 ${g.ma ?? "-"}% / 日次 ${g.raw ?? "-"}%`);
        }
        return lines.length > 1 ? lines.join("<br>") : `${ps[0].name}<br>データなし`;
      },
    },
    animation: false, // ON/OFF 切り替え時のアニメーションなし
    legend: {
      type: "scroll", // ジョブが多いときは矢印でスクロール
      orient: "vertical",
      left: 0,
      top: "middle",
      selected, // クリックで ON/OFF、期間を変えても状態を引き継ぐ
      formatter: (name) => (name.length > 20 ? name.slice(0, 19) + "…" : name),
    },
    // 他のチャートと X 軸位置を揃えるため left を合わせる (左は凡例のスペース)
    grid: { left: 250, right: 30, top: 20, bottom: 70 },
    xAxis: { type: "category", data: t.dates, boundaryGap: false, axisLabel: { rotate: 45 } },
    yAxis: { type: "value", min: 0, max: 100, axisLabel: { formatter: "{value}%" } },
    // ジョブごとに「日次の生値 (薄い細線)」と「移動平均 (太線)」の 2 系列。
    // 同じ name にすると凡例 1 つでまとめて ON/OFF できる。
    series: t.perJob.flatMap((j, vi) => {
      const color = PALETTE[vi % PALETTE.length];
      return [
        {
          id: "raw:" + vi,
          name: j.name,
          type: "line",
          data: j.rates,
          connectNulls: false,
          symbol: "none",
          lineStyle: { color, width: 1, opacity: 0.25 },
          itemStyle: { color },
          emphasis: { disabled: true },
        },
        {
          id: "ma:" + vi,
          name: j.name,
          type: "line",
          data: j.maRates,
          connectNulls: false,
          symbol: "none",
          lineStyle: { color, width: 2.5 },
          itemStyle: { color },
        },
      ];
    }),
  };
}

function heatmapOption(values) {
  return {
    tooltip: {
      formatter: (p) =>
        `<b>${viewJobs[p.value[1]]}</b><br>${currentDates[p.value[0]]}<br>` +
        `失敗率 ${p.value[2]}% (${p.value[3]}/${p.value[4]} 件)`,
    },
    grid: { left: 250, right: 30, top: 20, bottom: 90 },
    xAxis: { type: "category", data: currentDates, axisLabel: { rotate: 45 } },
    yAxis: {
      type: "category",
      data: viewJobs,
      inverse: true,
      axisLabel: { width: 230, overflow: "truncate" },
    },
    visualMap: {
      show: false, // 色分けの定義のみに使い、凡例バーは出さない
      min: 0,
      max: 100,
      dimension: 2,
      hoverLink: false,
      inRange: { color: ["#e8f5e9", "#fff59d", "#ef5350", "#b71c1c"] },
    },
    series: [{
      type: "heatmap",
      data: values,
      label: {
        show: currentDates.length <= 92, // 長期間表示はセル幅が足りないので非表示
        fontSize: 10,
        formatter: (p) => p.value[4], // その日のビルド回数 (総数)
      },
      itemStyle: { borderColor: "#fff", borderWidth: 1 },
    }],
  };
}

// ---- 期間選択 (カレンダー + プリセット) ----

const fromInput = document.getElementById("from");
const toInput = document.getElementById("to");
fromInput.min = toInput.min = MIN_DATE;
fromInput.max = toInput.max = MAX_DATE;

function render() {
  // 入力をデータ範囲に収め、開始 > 終了なら開始に合わせる
  if (!fromInput.value) fromInput.value = MIN_DATE;
  if (!toInput.value) toInput.value = MAX_DATE;
  if (fromInput.value < MIN_DATE) fromInput.value = MIN_DATE;
  if (toInput.value > MAX_DATE) toInput.value = MAX_DATE;
  if (fromInput.value > toInput.value) toInput.value = fromInput.value;

  const fromMs = parseDate(fromInput.value);
  const endMs = parseDate(toInput.value) + DAY_MS; // 終了日の翌日 0 時 (排他)
  const axisMax = Math.min(endMs, DATA.now);       // 終了日が今日なら現在時刻まで

  computeView(fromMs, endMs);
  // 行数が変わるチャートの高さを表示ジョブ数に合わせる
  tlEl.style.height = viewJobs.length * ROW_H_TL + 100 + "px";
  trendEl.style.height = Math.max(300, viewJobs.length * 24 + 80) + "px";
  hmEl.style.height = viewJobs.length * ROW_H_HM + 120 + "px";
  tl.resize(); trend.resize(); hm.resize();

  stats = computeStats(fromMs, endMs);
  currentSpans = computeSpans(fromMs, Math.min(endMs, DATA.now));
  const heat = computeHeatmap(fromMs, endMs);
  currentDates = heat.dates;

  tl.setOption(timelineOption(fromMs, axisMax), true);
  trend.setOption(trendOption(computeTrends(fromMs, endMs), trendSelected), true);
  hm.setOption(heatmapOption(heat.values), true);

  const days = Math.round((endMs - fromMs) / DAY_MS);
  document.getElementById("meta").textContent =
    `生成: ${DATA.generated_at} / 表示期間: ${fromInput.value} 〜 ${toInput.value} (${days}日)` +
    ` / 表示ジョブ: ${viewJobs.length} / ${jobs.length}`;
  document.getElementById("job-count").textContent =
    viewJobs.length === jobs.length ? `全 ${jobs.length} ジョブ` : `${viewJobs.length} / ${jobs.length} ジョブ`;
  document.querySelectorAll("#presets button").forEach((b) => {
    b.classList.toggle(
      "active",
      toInput.value === MAX_DATE && fromInput.value === dayKey(daysAgo(Number(b.dataset.days) - 1))
    );
  });
}

fromInput.addEventListener("change", render);
toInput.addEventListener("change", render);
document.getElementById("job-search").addEventListener("input", render);
document.getElementById("failed-only").addEventListener("change", render);
document.getElementById("job-sort").addEventListener("change", render);

const presetEl = document.getElementById("presets");
for (const d of [7, 14, 30, 60, 90, 180, 365].filter((d) => d <= DATA.days)) {
  const btn = document.createElement("button");
  btn.textContent = `${d}日`;
  btn.dataset.days = d;
  btn.addEventListener("click", () => {
    fromInput.value = dayKey(daysAgo(d - 1));
    toInput.value = MAX_DATE;
    render();
  });
  presetEl.appendChild(btn);
}

fromInput.value = MIN_DATE;
toInput.value = MAX_DATE;
render();
window.addEventListener("resize", () => { tl.resize(); trend.resize(); hm.resize(); });
</script>
</body>
</html>
